name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PySide6

      - name: Build Windows package
        shell: cmd
        env:
          CI: "1"
        run: scripts\build_windows.bat

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaraokeStudio-windows
          path: |
            dist/windows/KaraokeStudio-windows.zip
            dist/windows/KaraokeStudio-windows.zip.sha256

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyinstaller PySide6

      - name: Build macOS package
        run: bash ./scripts/build_macos.command

      - name: Archive macOS package
        run: |
          cd dist/macos
          ditto -c -k --sequesterRsrc --keepParent "Karaoke Studio.app" "../../KaraokeStudio-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaraokeStudio-macos
          path: KaraokeStudio-macos.zip

  release:
    name: Publish Release
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: KaraokeStudio-windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: KaraokeStudio-macos
          path: release-assets/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/KaraokeStudio-windows.zip
            release-assets/windows/KaraokeStudio-windows.zip.sha256
            release-assets/macos/KaraokeStudio-macos.zip
